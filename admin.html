<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Raksha Admin | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 flex h-screen overflow-hidden text-slate-700">

    <aside class="w-64 bg-slate-900 text-white flex flex-col">
        <div class="p-6 text-2xl font-bold border-b border-slate-800">RAKSHA & CO.</div>
        <nav class="flex-1 p-4 space-y-2">
            <button onclick="showTab('inventory')" class="w-full flex items-center p-3 hover:bg-slate-800 rounded transition"><i class="fa fa-mask mr-3"></i> Inventory</button>
            <button onclick="showTab('orders')" class="w-full flex items-center p-3 hover:bg-slate-800 rounded transition"><i class="fa fa-shopping-cart mr-3"></i> Orders</button>
            <button onclick="showTab('earnings')" class="w-full flex items-center p-3 hover:bg-slate-800 rounded transition"><i class="fa fa-chart-line mr-3"></i> Earnings</button>
        </nav>
        <div class="p-4 border-t border-slate-800">
            <a href="index.html" class="text-xs text-slate-400 hover:text-white uppercase tracking-widest">View Live Site</a>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-10">
        
        <div id="tab-inventory" class="tab-content">
            <h2 class="text-3xl font-bold mb-8">Manage Inventory</h2>
            
            <div class="bg-white p-6 rounded-xl shadow-sm border mb-10">
                <h3 class="font-bold mb-4">Add New Item</h3>
                <div class="grid grid-cols-3 gap-4">
                    <input id="item-name" placeholder="Item Name" class="border p-2 rounded">
                    <input id="item-price" type="number" placeholder="Price (JPY)" class="border p-2 rounded">
                    <input id="item-img" placeholder="Image URL" class="border p-2 rounded">
                    <button onclick="saveItem()" class="bg-blue-600 text-white font-bold py-2 rounded col-span-3 hover:bg-blue-700">Add to SQL Database</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-4">Name</th><th class="p-4">Price</th><th class="p-4">Action</th></tr>
                    </thead>
                    <tbody id="inventory-list"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-orders" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-8">Recent Orders</h2>
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b">
                        <tr><th class="p-4">Customer</th><th class="p-4">Total</th><th class="p-4">Status</th></tr>
                    </thead>
                    <tbody id="order-list"></tbody>
                </table>
            </div>
        </div>

        <div id="tab-earnings" class="tab-content hidden">
            <h2 class="text-3xl font-bold mb-8">Financial Overview</h2>
            <div class="grid grid-cols-3 gap-6 mb-10">
                <div class="bg-green-100 p-6 rounded-xl border border-green-200">
                    <p class="text-sm text-green-700 font-bold uppercase">Total Revenue</p>
                    <h3 id="stat-revenue" class="text-4xl font-black text-green-900">¥0</h3>
                </div>
                <div class="bg-blue-100 p-6 rounded-xl border border-blue-200">
                    <p class="text-sm text-blue-700 font-bold uppercase">Orders Count</p>
                    <h3 id="stat-count" class="text-4xl font-black text-blue-900">0</h3>
                </div>
            </div>
        </div>

    </main>

    <script>
        // Setup Supabase
        const _supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        // Tab Switching Logic
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            document.getElementById('tab-' + tabName).classList.remove('hidden');
            if(tabName === 'inventory') loadInventory();
            if(tabName === 'orders') loadOrders();
            if(tabName === 'earnings') loadEarnings();
        }

        // --- INVENTORY LOGIC ---
        async function loadInventory() {
            const { data } = await _supabase.from('products').select('*');
            const list = document.getElementById('inventory-list');
            list.innerHTML = data.map(item => `
                <tr class="border-b">
                    <td class="p-4 font-bold">${item.name}</td>
                    <td class="p-4 text-orange-700">¥${item.price_jpy}</td>
                    <td class="p-4"><button class="text-red-500 text-xs">Delete</button></td>
                </tr>
            `).join('');
        }

        async function saveItem() {
            const name = document.getElementById('item-name').value;
            const price = document.getElementById('item-price').value;
            const img = document.getElementById('item-img').value;
            await _supabase.from('products').insert([{ name, price_jpy: price, image_url: img }]);
            alert("Item Added!");
            loadInventory();
        }

        // --- ORDERS & EARNINGS LOGIC ---
        async function loadOrders() {
            const { data } = await _supabase.from('orders').select('*');
            const list = document.getElementById('order-list');
            list.innerHTML = data.map(o => `
                <tr class="border-b">
                    <td class="p-4">${o.customer_name}<br><span class="text-xs text-gray-400">${o.customer_email}</span></td>
                    <td class="p-4 font-bold">¥${o.total_price}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-yellow-100 text-yellow-700 rounded text-xs">${o.status}</span></td>
                </tr>
            `).join('');
        }

        async function loadEarnings() {
            const { data } = await _supabase.from('orders').select('total_price');
            const total = data.reduce((acc, current) => acc + current.total_price, 0);
            document.getElementById('stat-revenue').innerText = "¥" + total.toLocaleString();
            document.getElementById('stat-count').innerText = data.length;
        }

        // Start on Inventory tab
        showTab('inventory');
    </script>
</body>
</html>
