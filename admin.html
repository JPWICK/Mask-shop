<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-lg mx-auto bg-white p-8 rounded shadow-lg">
        <h2 class="text-2xl font-bold mb-6">Add New Product</h2>
        <div class="space-y-4">
            <input id="name" placeholder="Mask Name" class="w-full border p-2 rounded">
            <input id="price" type="number" placeholder="Price (JPY)" class="w-full border p-2 rounded">
            <input id="img" placeholder="Image URL (Direct link)" class="w-full border p-2 rounded">
            <button onclick="save()" class="w-full bg-black text-white p-3 rounded font-bold">SAVE TO SQL</button>
        </div>
        <div id="status" class="mt-4 text-center text-green-600"></div>
    </div>

    <script>
        const supabase = supabase.createClient('YOUR_URL', 'YOUR_KEY');

        async function save() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const img = document.getElementById('img').value;

            const { error } = await supabase.from('products').insert([{ 
                name: name, 
                price_jpy: price, 
                image_url: img 
            }]);

            if (error) alert(error.message);
            else document.getElementById('status').innerText = "Product Added!";
        }
    </script>
</body>
</html>
